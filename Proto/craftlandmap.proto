syntax = "proto3";

package craftlandmap;

// ==================== معلومات الخريطة ====================

// المعلومات الأساسية للخريطة
message WorkshopBasicInfo {
    string workshop_name = 1;               // اسم الخريطة
    string author_id = 2;                  // معرف صانع الخريطة
    string perf_cost = 3;                  // تكلفة الأداء
    uint64 update_time = 4;                // وقت آخر تحديث
    string resource_statistics = 5;        // إحصائيات الموارد
    string author_name = 6;                // اسم صانع الخريطة
    string workshop_desc = 7;              // وصف الخريطة
    uint32 game_mode = 8;                  // وضع اللعبة
    repeated uint32 tags = 9;              // الوسوم
    string mode_settings = 10;             // إعدادات الوضع
    uint32 team_count = 11;                // عدد الفرق
    string mini_map_settings = 12;         // إعدادات الخريطة المصغرة
    string mini_map_object_settings = 13;  // إعدادات كائنات الخريطة المصغرة
    uint32 map_id = 14;                    // معرف الخريطة
    uint64 create_time = 15;               // وقت الإنشاء
    map<string, string> comment_info = 16; // معلومات التعليقات
    uint32 mode_template_id = 17;          // معرف قالب الوضع
    uint32 ob_version = 18;                // إصدار OB
    string matchmaking_rule = 19;          // قواعد المطابقة
    uint32 download_count = 20;            // عدد مرات التحميل
    uint32 like_count = 21;                // عدد الإعجابات
    uint32 play_count = 22;                // عدد مرات اللعب
    uint32 rating = 23;                    // التقييم
    uint32 rating_count = 24;              // عدد التقييمات
    string preview_image_url = 25;         // رابط الصورة المصغرة
    uint32 map_width = 26;                 // عرض الخريطة
    uint32 map_height = 27;                // ارتفاع الخريطة
    repeated string required_items = 28;   // العناصر المطلوبة
    bool is_featured = 29;                 // هل هي خريطة مميزة
    uint32 difficulty = 30;                // مستوى الصعوبة
    uint32 max_players = 31;               // الحد الأقصى للاعبين
    string category = 32;                  // فئة الخريطة
}

// طلب معلومات خريطة محددة
message CraftlandMapInfoReq {
    string map_code = 1;                   // رمز الخريطة الفريد
    uint64 account_id = 2;                 // معرف اللاعب (اختياري)
}

// رد معلومات خريطة مفصلة
message CraftlandMapInfoRes {
    WorkshopBasicInfo workshop_basic_info = 1;  // المعلومات الأساسية للخريطة
    string map_data = 2;                       // بيانات الخريطة (مشفرة)
    uint32 download_count = 3;                 // عدد مرات التحميل
    uint32 like_count = 4;                     // عدد الإعجابات
    uint32 play_count = 5;                     // عدد مرات اللعب
    uint32 rating = 6;                         // التقييم
    uint32 rating_count = 7;                   // عدد التقييمات
    bool is_liked_by_user = 8;                 // هل أعجب المستخدم
    bool is_downloaded_by_user = 9;            // هل تم تحميلها من قبل المستخدم
    string share_link = 10;                    // رابط المشاركة
    repeated string top_comments = 11;         // أبرز التعليقات
}

// طلب قائمة الخرائط الشائعة
message CraftlandMapListReq {
    uint64 account_id = 1;                   // معرف اللاعب (اختياري)
    uint32 page = 2;                         // رقم الصفحة
    uint32 page_size = 3;                    // عدد النتائج في الصفحة
    string sort_by = 4;                      // ترتيب حسب (popular, newest, top_rated)
    string category = 5;                     // فئة الخريطة
    string search_keyword = 6;               // كلمة بحث
}

// رد قائمة الخرائط
message CraftlandMapListRes {
    repeated WorkshopBasicInfo maps = 1;      // قائمة الخرائط
    uint32 total_count = 2;                  // إجمالي عدد الخرائط
    uint32 current_page = 3;                 // الصفحة الحالية
    uint32 total_pages = 4;                  // إجمالي الصفحات
}